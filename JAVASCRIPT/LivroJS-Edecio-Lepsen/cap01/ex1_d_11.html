// Elaborar um programa que leia 2 notas de um aluno em uma disciplina. Calcule e informe a média de notas.

<script>
    let n1 = Number(prompt("Digite a primeira nota: "))
    let n2 = Number(prompt("Digite a segunda nota: "))

    let media = (n1 + n2) / 2

    alert(`1º Nota: ${n1} \n2º Nota: ${n2} \nMédia: ${media}`)

</script>
