// Elaborar um programa para uma pizzaria, o qual leia o valor total de uma conta e quantos clientes vão pagá-la. Calcule e informe o valor a ser pago por clientes

<script>
    let valorTotal = Number(prompt("Valor: "))
    let qntdCliente = Number(prompt("Número de clientes: "))
    let valorCliente = valorTotal / qntdCliente

    alert(`Valor da Conta R$${valorTotal.toFixed(2)} \nNúmero de Clientes: ${qntdCliente} \nValor por cliente R$${valorCliente.toFixed(2)}`)
</script>
