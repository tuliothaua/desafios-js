// Elaborar um programa que leia a duração de uma viagem em dias e horas. Calcule e informe a duração total da viagem em número de horas.

<script>
    let dias = Number(prompt("Nº de Dias: "))
    let horas = Number(prompt("Nº de Horas: "))

    let calculo = (dias * 24) + horas

    alert(`Total de Horas: ${calculo}`)

</script>
