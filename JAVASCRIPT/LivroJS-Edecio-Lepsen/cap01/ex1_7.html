// Elaborar um programa que leia o valor de um jantar. Calcule e informe o valor da taxa do garçom (10%) e o valor total a ser pago.

<script>
    let valorJantar = Number(prompt("Valor do Jantar: "))
    let taxaGarcom = valorJantar * 0.10
    let valorTotal = valorJantar + taxaGarcom

    alert(`Valor do jantar: R$${valorJantar.toFixed(2)}\nTaxa do Garçom: R$${taxaGarcom.toFixed(2)}\nValor Total a pagar: R$${valorTotal.toFixed(2)}`)
    
</script>
