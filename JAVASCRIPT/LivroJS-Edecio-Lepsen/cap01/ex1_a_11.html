// Elaborar um programa que leia um número. Calcule e informe os seus vizinhos, ou seja, o número anterior e posterior.

<script>
    let num = Number(prompt("Type a number: "))
    let neighborLeft = num - 1
    let neighborRight = num + 1

    alert(`Number: ${num} \nNeighbors: ${neighborLeft} and ${neighborRight}`)
</script>
